<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iREVA Platform</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f7fa;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
        }
        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(37, 99, 235, 0.2);
            border-radius: 50%;
            border-top-color: #2563eb;
            animation: spin 1s ease-in-out infinite;
            margin: 30px 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 10px;
        }
        .loading-text {
            position: relative;
            font-weight: bold;
            margin-top: 20px;
        }
        .loading-text:after {
            content: '...';
            position: absolute;
            width: 20px;
            text-align: left;
            animation: dots 2s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .status-message {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>
    <div class="loading-container" id="loadingContainer">
        <div class="logo">iREVA</div>
        <p>Real Estate Investment Platform</p>
        <div class="loader"></div>
        <p class="loading-text">Loading application</p>
        <p class="status-message">Connecting to property investment platform...</p>
    </div>
    
    <iframe id="appFrame" class="iframe-container" allowfullscreen></iframe>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loadingContainer = document.getElementById('loadingContainer');
            const appFrame = document.getElementById('appFrame');
            
            // Function to get the base URL without port
            function getBaseUrl() {
                const protocol = window.location.protocol;
                const hostname = window.location.hostname;
                return `${protocol}//${hostname}`;
            }
            
            // Define potential URLs to try
            const baseUrl = getBaseUrl();
            const urls = [
                `${baseUrl}:3001/`,  // Try port 3001 first (webview default)
                `${baseUrl}:5001/`,  // Try port 5001 (main app)
                `${baseUrl}:5000/`,  // Try port 5000 (proxy server)
                `${baseUrl}/`        // Try without port
            ];
            
            let currentUrlIndex = 0;
            
            // Update status message
            function updateStatus(message) {
                const statusEl = document.querySelector('.status-message');
                if (statusEl) {
                    statusEl.textContent = message;
                }
            }
            
            // Function to try loading the next URL
            function tryNextUrl() {
                if (currentUrlIndex >= urls.length) {
                    // If all URLs failed, show a message
                    loadingContainer.innerHTML = `
                        <div class="logo">iREVA</div>
                        <p>Connection Issue</p>
                        <p style="max-width: 400px; margin: 20px auto;">
                            We're having trouble connecting to the application.
                            Please make sure the application workflow is running and try again.
                        </p>
                        <button onclick="location.reload()" style="
                            padding: 12px 24px;
                            background-color: #2563eb;
                            color: white;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            margin-top: 20px;
                            font-weight: bold;
                        ">Retry Connection</button>
                    `;
                    return;
                }
                
                // Try the current URL
                console.log("Trying URL:", urls[currentUrlIndex]);
                
                // Update status message based on which URL we're trying
                const portName = urls[currentUrlIndex].includes(':3001') ? 'Webview port (3001)' :
                                urls[currentUrlIndex].includes(':5001') ? 'Application port (5001)' :
                                urls[currentUrlIndex].includes(':5000') ? 'Proxy port (5000)' : 'Default port';
                                
                updateStatus(`Connecting to ${portName}...`);
                
                // Load the URL in the iframe
                appFrame.src = urls[currentUrlIndex];
                
                // Set a timeout for this attempt
                setTimeout(() => {
                    currentUrlIndex++;
                    tryNextUrl();
                }, 3000);
            }
            
            // Handle iframe load event
            appFrame.addEventListener('load', function() {
                try {
                    // Check if the iframe content is accessible
                    const iframeContent = appFrame.contentWindow.document.body;
                    
                    // If we can access the content, show the iframe
                    loadingContainer.style.display = 'none';
                    appFrame.style.display = 'block';
                    
                    console.log("Successfully loaded URL:", appFrame.src);
                } catch (error) {
                    // If we can't access the content (CORS error), try next URL
                    console.error("Failed to load:", appFrame.src, error);
                    currentUrlIndex++;
                    tryNextUrl();
                }
            });
            
            // Start trying URLs
            tryNextUrl();
        });
    </script>
</body>
</html>
