# Render.com deployment configuration for iREVA Platform
services:
  # Backend API Server
  - type: web
    name: ireva-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MINIMAL_STARTUP
        value: "true"
      - key: REDIS_GRACEFUL_FALLBACK
        value: "true"
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ireva-postgres
          property: connectionString
      - key: DB_INITIALIZATION_MODE
        value: "production"
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    autoDeploy: true

  # Frontend Static Site  
  - type: web
    name: ireva-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build:client
    staticPublishPath: dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ireva-backend.onrender.com
    autoDeploy: true

# Database
databases:
  - name: ireva-postgres
    databaseName: ireva_production
    user: ireva_user
    plan: free