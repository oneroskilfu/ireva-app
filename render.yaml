# Render.com Blueprint for iREVA Platform
# Professional deployment configuration for Nigerian real estate investment platform

services:
  # Backend: Express.js Web Service
  - type: web
    name: ireva-backend
    env: docker
    dockerfilePath: ./apps/server/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ireva-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ireva-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: POSTGRES_USER
        value: ireva_user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: ireva-postgres
          property: password
      - key: POSTGRES_DB
        value: ireva_production

  # Frontend: React + Vite Static Site
  - type: web
    name: ireva-frontend
    env: static
    buildCommand: cd apps/client && npm install && npm run build
    staticPublishPath: apps/client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ireva-backend.onrender.com/api
      - key: VITE_ENVIRONMENT
        value: production

databases:
  - name: ireva-postgres
    databaseName: ireva_production
    user: ireva_user
    plan: free

  - name: ireva-redis
    plan: free