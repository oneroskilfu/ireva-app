# Docker Compose for iREVA Platform Local Development
# This mirrors your current Replit setup for easy local development

version: '3.8'

services:
  backend:
    build: ./apps/server
    container_name: ireva-backend
    ports:
      - '5000:5000'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - ireva-net


  frontend:
    build: ./apps/client
    container_name: ireva-frontend
    ports:
      - '3000:80'
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - ireva-net

  postgres:
    image: postgres:15
    container_name: ireva-db
    restart: always
    environment:
      POSTGRES_DB: ireva
      POSTGRES_USER: ireva_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ireva-net

  redis:
    image: redis:7
    container_name: ireva-redis
    restart: always
    networks:
      - ireva-net

networks:
  ireva-net:
    driver: bridge

volumes:
  pgdata: