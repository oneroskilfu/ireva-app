# Docker Compose for iREVA Platform Local Development
# This mirrors your current Replit setup for easy local development

version: "3.9"

services:
  # iREVA Backend API
  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://ireva_user:ireva_password@postgres:5432/ireva_dev
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-minimum-32-characters}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload for development
      - ./server:/app/server
      - ./shared:/app/shared
      # Cache volumes for faster rebuilds
      - backend_node_modules:/app/node_modules
      - npm_cache:/root/.npm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # iREVA Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ireva_dev
      - POSTGRES_USER=ireva_user
      - POSTGRES_PASSWORD=ireva_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ireva_user -d ireva_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  # Cache volumes for faster Docker builds
  backend_node_modules:
  frontend_node_modules:
  npm_cache:

networks:
  default:
    name: ireva-network