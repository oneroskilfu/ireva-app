# Docker Compose for iREVA Platform Local Development
# This mirrors your current Replit setup for easy local development

version: '3.8'

services:
  # iREVA Platform (Frontend + Backend)
  ireva-app:
    build:
      context: .
      dockerfile: Dockerfile
      # Enable BuildKit for cache optimization
      target: production
    ports:
      - "5000:10000"
    environment:
      - NODE_ENV=development
      - PORT=10000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    volumes:
      # Hot reload for development
      - ./server:/app/server
      - ./client:/app/client
      - ./shared:/app/shared
      # Cache volumes for faster rebuilds
      - node_modules_cache:/app/node_modules
      - npm_cache:/root/.npm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ireva_dev
      - POSTGRES_USER=ireva_user
      - POSTGRES_PASSWORD=ireva_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ireva_user -d ireva_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  # Cache volumes for faster Docker builds
  node_modules_cache:
  npm_cache:

networks:
  default:
    name: ireva-network