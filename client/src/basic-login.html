<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Login Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .container {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 5px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    .response {
      margin-top: 20px;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 4px;
      background-color: #f9f9f9;
    }
    .error {
      color: #721c24;
      background-color: #f8d7da;
      border: 1px solid #f5c6cb;
      padding: 10px;
      border-radius: 4px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Basic Login Test</h1>
  
  <div class="container">
    <div class="form-group">
      <label for="username">Username:</label>
      <input type="text" id="username" value="admin">
    </div>
    
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" value="password">
    </div>
    
    <button onclick="login()">Login</button>
    
    <div id="error" class="error" style="display: none;"></div>
    
    <div class="response">
      <h3>Response:</h3>
      <pre id="response">No response yet</pre>
    </div>
  </div>
  
  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const responseElement = document.getElementById('response');
      const errorElement = document.getElementById('error');
      
      // Clear previous results
      responseElement.textContent = 'Logging in...';
      errorElement.style.display = 'none';
      
      try {
        console.log(`Attempting to login with username: ${username}`);
        
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username,
            password
          })
        });
        
        const data = await response.json();
        console.log('Login response:', data);
        
        if (response.ok) {
          responseElement.textContent = JSON.stringify(data, null, 2);
          
          // Store in localStorage for testing private routes
          localStorage.setItem('user', JSON.stringify({
            ...data,
            role: data.isAdmin ? 'admin' : 'investor'
          }));
          localStorage.setItem('token', 'session-auth-token');
          
          console.log('Stored in localStorage:', {
            user: JSON.parse(localStorage.getItem('user') || '{}'),
            token: localStorage.getItem('token')
          });
        } else {
          errorElement.textContent = `Error: ${data.message || 'Login failed'}`;
          errorElement.style.display = 'block';
          responseElement.textContent = JSON.stringify(data, null, 2);
        }
      } catch (error) {
        console.error('Login error:', error);
        errorElement.textContent = `Error: ${error.message}`;
        errorElement.style.display = 'block';
        responseElement.textContent = 'Request failed';
      }
    }
  </script>
</body>
</html>
