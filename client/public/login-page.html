<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iREVA Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div>
                <div class="flex justify-center">
                    <div class="text-center">
                        <span class="text-red-600 font-bold text-5xl">i</span>
                        <span class="text-gray-800 font-bold text-5xl">REVA</span>
                    </div>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                    Sign in to your account
                </h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    Nigeria's premier real estate investment platform
                </p>
            </div>
            
            <form id="loginForm" class="mt-8 space-y-6">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="username" class="sr-only">Username</label>
                        <input
                            id="username"
                            name="username"
                            type="text"
                            required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-red-500 focus:border-red-500 focus:z-10 sm:text-sm"
                            placeholder="Username"
                        />
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-red-500 focus:border-red-500 focus:z-10 sm:text-sm"
                            placeholder="Password"
                        />
                    </div>
                </div>

                <div id="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative hidden" role="alert">
                    <span class="block sm:inline" id="errorText"></span>
                </div>

                <div>
                    <button
                        type="submit"
                        id="submitButton"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50"
                    >
                        <span id="buttonText">Sign in</span>
                        <span id="loadingIndicator" class="hidden flex items-center">
                            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Signing in...
                        </span>
                    </button>
                </div>
                
                <div class="flex items-center justify-center">
                    <div class="text-sm">
                        <p class="text-gray-600">
                            Don't have an account?
                            <a href="/register" class="font-medium text-red-600 hover:text-red-500">
                                Register now
                            </a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (token && userStr) {
                try {
                    const user = JSON.parse(userStr);
                    if (user.isAdmin || user.role === 'admin') {
                        window.location.href = '/admin-dashboard.html';
                    } else {
                        window.location.href = '/';
                    }
                    return;
                } catch (error) {
                    console.error('Error parsing user data:', error);
                    // Continue with login form
                }
            }
            
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const submitButton = document.getElementById('submitButton');
            const buttonText = document.getElementById('buttonText');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Reset error
                errorMessage.classList.add('hidden');
                
                // Show loading state
                buttonText.classList.add('hidden');
                loadingIndicator.classList.remove('hidden');
                submitButton.disabled = true;
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, password }),
                        credentials: 'include'
                    });
                    
                    if (!response.ok) {
                        throw new Error('Invalid credentials. Please try again.');
                    }
                    
                    const userData = await response.json();
                    
                    // Convert isAdmin to role for consistency
                    const userWithRole = {
                        ...userData,
                        role: userData.isAdmin ? 'admin' : 'investor'
                    };
                    
                    // Store user data
                    localStorage.setItem('user', JSON.stringify(userWithRole));
                    localStorage.setItem('token', 'session-auth-token');
                    
                    // Redirect based on role
                    if (userData.isAdmin || userWithRole.role === 'admin') {
                        window.location.href = '/admin-dashboard.html';
                    } else {
                        window.location.href = '/';
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    
                    // Show error message
                    errorText.textContent = error.message || 'An error occurred during login. Please try again.';
                    errorMessage.classList.remove('hidden');
                    
                    // Reset button
                    buttonText.classList.remove('hidden');
                    loadingIndicator.classList.add('hidden');
                    submitButton.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
